apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: frontend-my-app-dev
  namespace: argocd
spec:
  description: Frontend project - Development
  sourceRepos:
    - https://github.com/aorko16/Helm-Argocd-01.git
  destinations:
    - namespace: my-app-dev
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-dev
  namespace: argocd
spec:
  project: frontend-my-app-dev
  source:
    repoURL: https://github.com/aorko16/Helm-Argocd-01.git
    targetRevision: main
    path: my-app
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yml
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
